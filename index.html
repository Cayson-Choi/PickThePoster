<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>포스터 갤러리</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; padding: 10px; }

  h1 { text-align: center; margin: 8px 0 4px; font-size: 1.3em; color: #e94560; }
  .subtitle { text-align: center; color: #aaa; margin-bottom: 12px; font-size: 0.8em; }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    max-width: 500px;
    margin: 0 auto;
  }

  .card {
    background: #16213e;
    border-radius: 8px;
    overflow: hidden;
  }

  .img-wrap {
    cursor: pointer;
    position: relative;
  }
  .img-wrap img {
    width: 100%;
    display: block;
  }

  .card-label {
    text-align: center;
    padding: 6px;
    font-weight: bold;
    font-size: 0.9em;
    color: #e94560;
  }

  /* 전체화면 오버레이 */
  .overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.95);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }
  .overlay.active { display: flex; }
  .overlay img {
    max-width: 95vw;
    max-height: 90vh;
    object-fit: contain;
  }
  .overlay-close {
    position: absolute;
    top: 10px; right: 15px;
    background: rgba(255,255,255,0.2);
    border: none;
    color: #fff;
    font-size: 1.8em;
    cursor: pointer;
    z-index: 1001;
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .overlay-info {
    margin-top: 10px;
    text-align: center;
    font-size: 1em;
    color: #ccc;
  }
  /* PC에서 좀 더 크게 */
  @media (min-width: 700px) {
    .grid { max-width: 800px; gap: 14px; }
    .card-label { font-size: 1.1em; }
    h1 { font-size: 1.8em; }
  }
</style>
</head>
<body>

<h1>포스터 갤러리</h1>
<p class="subtitle">이미지를 터치하면 크게 볼 수 있어요</p>

<div class="grid" id="grid"></div>

<!-- 전체화면 미리보기 -->
<div class="overlay" id="overlay">
  <button class="overlay-close" onclick="closeOverlay()">&times;</button>
  <img id="overlayImg" src="" alt="">
  <div class="overlay-info" id="overlayInfo"></div>
</div>

<script>
const IMAGES = ['1.png','2.png','3.png','4.png','5.png','6.png','7.png','8.png','9.png'];

function render() {
  const grid = document.getElementById('grid');
  IMAGES.forEach(img => {
    const name = img.replace('.png', '');
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => openOverlay(img, name);
    card.innerHTML = `
      <img src="${img}" alt="포스터 ${name}" loading="lazy">
      <div class="card-label">${name}번</div>
    `;
    grid.appendChild(card);
  });
}

function openOverlay(img, name) {
  document.getElementById('overlayImg').src = img;
  document.getElementById('overlayInfo').textContent = name + '번';
  document.getElementById('overlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('active');
  document.body.style.overflow = '';
}

document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) closeOverlay();
});

render();
</script>
</body>
</html>
